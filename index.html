<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Budget Tracker App</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Current Date */
        .current-date {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.95;
        }

        /* Summary Cards - Fixed to single row */
        .summary {
            display: flex;
            flex-direction: row;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .card {
            flex: 1;
            min-width: 0;
            background: white;
            padding: 16px 12px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            color: #6b7280;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card .amount {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .budget-card .amount {
            color: #3b82f6;
        }

        .expense-card .amount {
            color: #ef4444;
        }

        .balance-card .amount {
            color: #10b981;
        }

        /* Forms */
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }

        .form-container h2 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 500;
            font-size: 0.85rem;
        }

        input, select, datalist {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Tabs at bottom - Centered */
        .tabs-bottom {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            display: flex;
            gap: 10px;
            padding: 8px 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            z-index: 1000;
            width: auto;
            min-width: 280px;
            max-width: 90%;
            justify-content: center;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 20px;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Overview Tab */
        .overview-controls {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .month-selector-wrapper,
        .category-selector-wrapper {
            margin-bottom: 15px;
        }
        
        .month-selector-wrapper:last-child,
        .category-selector-wrapper:last-child {
            margin-bottom: 0;
        }
        
        .overview-controls label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .overview-controls select, 
        .overview-controls input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        
        .overview-controls select:focus,
        .overview-controls input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        canvas {
            max-height: 300px;
            width: 100%;
        }

        .subcategory-table {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .subcategory-table h3 {
            margin-bottom: 16px;
            color: #1f2937;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .subcategory-group {
            margin-bottom: 20px;
            border-left: 3px solid #667eea;
            padding-left: 15px;
        }

        .subcategory-title {
            font-size: 1rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 10px;
        }

        .transaction-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .subtotal {
            margin-top: 8px;
            padding-top: 6px;
            font-weight: 700;
            color: #1f2937;
            border-top: 1px solid #e5e7eb;
            font-size: 0.9rem;
        }

        /* Budget Tab */
        .budget-tab-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .category-selector {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e5e7eb;
        }

        .category-selector h3 {
            margin-bottom: 12px;
            color: #1f2937;
            font-size: 1.1rem;
        }

        .category-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .category-checkbox label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .category-checkbox input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        .category-budget-input {
            margin-left: 25px;
            margin-top: 8px;
            margin-bottom: 12px;
            padding-left: 15px;
            border-left: 2px solid #667eea;
        }

        .category-budget-input input {
            width: 150px;
            display: inline-block;
            margin-left: 10px;
        }

        .subcategory-budget-section {
            margin-left: 25px;
            padding-left: 15px;
            margin-top: 8px;
            margin-bottom: 15px;
        }

        .subcategory-budget-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .subcategory-budget-row span {
            font-size: 0.85rem;
            color: #6b7280;
            min-width: 100px;
        }

        .subcategory-budget-row input {
            width: 120px;
            padding: 6px;
        }

        .toggle-subcategory {
            background: none;
            border: none;
            color: #667eea;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            padding: 4px 8px;
            margin-top: 5px;
        }

        .add-custom-btn {
            background: #10b981;
            margin-top: 16px;
        }

        .add-custom-btn:hover {
            background: #059669;
        }

        .custom-input-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .custom-input-group input {
            flex: 1;
        }

        .custom-input-group button {
            width: auto;
            padding: 12px 20px;
        }

        .btn-remove {
            background: #ef4444;
            width: auto;
            padding: 4px 12px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                padding-bottom: 80px;
            }
            
            .card {
                padding: 12px 8px;
            }
            
            .card .amount {
                font-size: 1rem;
            }
            
            .card h3 {
                font-size: 0.65rem;
            }
            
            .tabs-bottom {
                padding: 6px 12px;
                gap: 8px;
                bottom: 12px;
                min-width: 260px;
            }
            
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            
            .category-budget-input input {
                width: 100%;
                margin-left: 0;
                margin-top: 5px;
            }
            
            .subcategory-budget-row {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .subcategory-budget-row input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
        <div class="container">
        <!-- Current Date -->
        <div class="current-date" id="currentDate"></div>

        <!-- Home Tab Content -->
        <div id="home" class="tab-content active">
            <!-- Summary Cards -->
            <div class="summary">
                <div class="card budget-card" id="budgetCard">
                    <h3>Monthly Budget</h3>
                    <div class="amount" id="displayBudget">$0.00</div>
                </div>
                <div class="card expense-card">
                    <h3>Expenses</h3>
                    <div class="amount" id="displayExpense">$0.00</div>
                </div>
                <div class="card balance-card">
                    <h3>Balance</h3>
                    <div class="amount" id="displayBalance">$0.00</div>
                </div>
            </div>

            <div class="form-container">
                <h2>Add Transaction</h2>
                <form id="transactionForm">
                    <div class="form-group">
                        <label for="amount">Amount *</label>
                        <input type="number" id="amount" required placeholder="0.00" step="0.01">
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="categorySelectHome" required>
                            <option value="">Select a category</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="subcategory">Sub-category</label>
                        <select id="subcategorySelectHome">
                            <option value="">Select a sub-category (optional)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <input type="text" id="description" placeholder="Additional details">
                    </div>
                    
                    <button type="submit">Add Transaction</button>
                </form>
            </div>
        </div>

        <!-- Budget Tab Content -->
        <div id="budget" class="tab-content">
            <div class="budget-tab-container">
                <h2 style="margin-bottom: 20px;">Set Budgets</h2>
                <div id="budgetSetupContainer"></div>
                
                <button id="addCustomCategoryBtn" class="add-custom-btn">+ Add Custom Category</button>
                <div id="customCategoryInput" style="display: none;" class="custom-input-group">
                    <input type="text" id="newCategoryName" placeholder="New category name">
                    <button id="confirmAddCategory">Add</button>
                    <button id="cancelAddCategory">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Overview Tab Content -->
        <div id="overview" class="tab-content">
            <div class="overview-controls">
                <div class="month-selector-wrapper">
                    <label for="monthSelect">Select Month:</label>
                    <input type="month" id="monthSelect">
                </div>
                <div class="category-selector-wrapper">
                    <label for="categorySelect">Select Category:</label>
                    <select id="categorySelect"></select>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="budgetChart"></canvas>
            </div>

            <div class="subcategory-table">
                <h3>Sub-category Expenses for <span id="selectedCategoryName"></span></h3>
                <div id="subcategoryListContainer"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Tabs -->
    <div class="tabs-bottom">
        <button class="tab-btn active" data-tab="home">Home</button>
        <button class="tab-btn" data-tab="budget">Budget</button>
        <button class="tab-btn" data-tab="overview">Overview</button>
    </div>

    <script>
                // DEFAULT CATEGORIES AND SUB-CATEGORIES
        const DEFAULT_CATEGORIES = {
            "Fixed Expenses": ["Rent", "Business", "Savings", "Balloon Payment", "Parents"],
            "Car": ["Fuel", "Maintenance", "Insurance", "Installment"],
            "Food": ["Groceries", "Dine Out / Take Away / Home Delivery", "Snacks"],
            "Healthcare": ["Pharmacy", "Doctor"],
            "Bills & Utilities": ["Electricity", "Water", "Internet", "Phone"],
            "Home": ["Khadija", "Maintenance"],
            "Transportation": ["Public Transport", "Taxi", "Flight"],
            "Personal": ["Clothing", "Baby", "Vape", "Electronics"],
            "Development": ["Books", "Courses", "Entertainment"],
            "Strategic Expense": []
        };

        // App State
        let transactions = [];
        let monthlyBudget = 0;
        let selectedCategories = {}; // { categoryName: { budget: 0, subcategoryBudgets: { subName: budget } } }
        let customCategories = {}; // User added categories
        let chart = null;
        
        // Load data from localStorage
        function loadData() {
            const savedTransactions = localStorage.getItem('budgetTransactions');
            if (savedTransactions) {
                transactions = JSON.parse(savedTransactions);
            }
            
            const savedBudget = localStorage.getItem('monthlyBudget');
            if (savedBudget) {
                monthlyBudget = parseFloat(savedBudget);
            }
            
            const savedSelectedCategories = localStorage.getItem('selectedCategories');
            if (savedSelectedCategories) {
                selectedCategories = JSON.parse(savedSelectedCategories);
            } else {
                // Initialize with some default selected categories
                selectedCategories = {
                    "Fixed Expenses": { budget: 0, subcategoryBudgets: {} },
                    "Car": { budget: 0, subcategoryBudgets: {} },
                    "Food": { budget: 0, subcategoryBudgets: {} }
                };
            }
            
            const savedCustomCategories = localStorage.getItem('customCategories');
            if (savedCustomCategories) {
                customCategories = JSON.parse(savedCustomCategories);
            } else {
                customCategories = {};
            }
            
            updateUI();
        }
        
        // Save data
        function saveData() {
            localStorage.setItem('budgetTransactions', JSON.stringify(transactions));
            localStorage.setItem('monthlyBudget', monthlyBudget);
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
            localStorage.setItem('customCategories', JSON.stringify(customCategories));
        }
        
        // Get all categories (default + custom)
        function getAllCategories() {
            const all = { ...DEFAULT_CATEGORIES, ...customCategories };
            return all;
        }
        
        // Get subcategories for a category
        function getSubcategories(category) {
            const all = getAllCategories();
            return all[category] || [];
        }
                // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const day = date.getDate();
            const month = date.toLocaleString('default', { month: 'short' });
            const year = date.getFullYear();
            return `${day} ${month}, ${year}`;
        }
        
        // Get current month (YYYY-MM)
        function getCurrentMonth() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        }
        
        // Display current date
        function displayCurrentDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
        }
        
        // Get expenses for a specific month (excluding Fixed Expenses)
        function getRegularExpensesForMonth(month) {
            return transactions.filter(t => t.month === month && t.category !== 'Fixed Expenses');
        }
        
        // Get all expenses including fixed for a specific month
        function getAllExpensesForMonth(month) {
            return transactions.filter(t => t.month === month);
        }
        
        // Get total expenses for a month (excluding Fixed Expenses)
        function getTotalExpensesForMonth(month) {
            const expenses = getRegularExpensesForMonth(month);
            return expenses.reduce((sum, t) => sum + t.amount, 0);
        }
        
        // Get balance
        function getBalance(month) {
            const expenses = getTotalExpensesForMonth(month);
            return monthlyBudget - expenses;
        }
        
        // Add transaction
        function addTransaction(amount, category, subcategory, description) {
            const transaction = {
                id: Date.now(),
                amount: parseFloat(amount),
                category: category.trim(),
                subcategory: subcategory ? subcategory.trim() : '',
                description: description || '',
                month: getCurrentMonth(),
                date: new Date().toISOString()
            };
            
            transactions.push(transaction);
            saveData();
            updateUI();
        }
                // Update Home tab UI
        function updateHomeTab() {
            const currentMonth = getCurrentMonth();
            const totalExpense = getTotalExpensesForMonth(currentMonth);
            const balance = getBalance(currentMonth);
            
            document.getElementById('displayBudget').textContent = `$${monthlyBudget.toFixed(2)}`;
            document.getElementById('displayExpense').textContent = `$${totalExpense.toFixed(2)}`;
            document.getElementById('displayBalance').textContent = `$${balance.toFixed(2)}`;
        }
        
        // Populate category dropdown in Home tab
        function populateHomeDropdowns() {
            const categories = Object.keys(getAllCategories());
            const categorySelect = document.getElementById('categorySelectHome');
            const currentCategory = categorySelect.value;
            
            categorySelect.innerHTML = '<option value="">Select a category</option>';
            categories.sort().forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
            
            if (currentCategory && categories.includes(currentCategory)) {
                categorySelect.value = currentCategory;
                updateSubcategoryDropdown(currentCategory);
            } else {
                document.getElementById('subcategorySelectHome').innerHTML = '<option value="">Select a sub-category (optional)</option>';
            }
        }
        
        // Update subcategory dropdown based on selected category
        function updateSubcategoryDropdown(category) {
            const subcategories = getSubcategories(category);
            const subSelect = document.getElementById('subcategorySelectHome');
            subSelect.innerHTML = '<option value="">Select a sub-category (optional)</option>';
            
            subcategories.forEach(sub => {
                const option = document.createElement('option');
                option.value = sub;
                option.textContent = sub;
                subSelect.appendChild(option);
            });
        }
                // Render Budget tab
        function renderBudgetTab() {
            const container = document.getElementById('budgetSetupContainer');
            const allCategories = getAllCategories();
            const categories = Object.keys(allCategories).sort();
            
            container.innerHTML = '';
            
            categories.forEach(category => {
                const isSelected = selectedCategories.hasOwnProperty(category);
                const categoryBudget = selectedCategories[category]?.budget || 0;
                const subcategoryBudgets = selectedCategories[category]?.subcategoryBudgets || {};
                const subcategories = allCategories[category];
                
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category-selector';
                categoryDiv.innerHTML = `
                    <div class="category-checkbox">
                        <input type="checkbox" id="cat_${category.replace(/\s/g, '_')}" ${isSelected ? 'checked' : ''}>
                        <label for="cat_${category.replace(/\s/g, '_')}"><strong>${category}</strong></label>
                        ${category !== 'Fixed Expenses' ? `<button class="btn-remove" onclick="removeCustomCategory('${category.replace(/'/g, "\\'")}')" ${!customCategories[category] ? 'style="display:none"' : ''}>Remove</button>` : ''}
                    </div>
                    ${isSelected ? `
                        <div class="category-budget-input">
                            <label>Category Budget: $</label>
                            <input type="number" id="budget_${category.replace(/\s/g, '_')}" value="${categoryBudget}" step="0.01" placeholder="0.00">
                        </div>
                        ${subcategories.length > 0 ? `
                            <button class="toggle-subcategory" onclick="toggleSubcategoryBudget('${category.replace(/'/g, "\\'")}')">
                                + Set Sub-category Budgets (Optional)
                            </button>
                            <div id="subcat_${category.replace(/\s/g, '_')}" style="display: none;" class="subcategory-budget-section">
                                ${subcategories.map(sub => `
                                    <div class="subcategory-budget-row">
                                        <span>${sub}:</span>
                                        <input type="number" id="subbudget_${category.replace(/\s/g, '_')}_${sub.replace(/\s/g, '_')}" 
                                               value="${subcategoryBudgets[sub] || 0}" step="0.01" placeholder="Optional budget">
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    ` : ''}
                `;
                container.appendChild(categoryDiv);
            });
            
            // Add event listeners for checkboxes
            categories.forEach(category => {
                const checkbox = document.getElementById(`cat_${category.replace(/\s/g, '_')}`);
                if (checkbox) {
                    checkbox.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            if (!selectedCategories[category]) {
                                selectedCategories[category] = { budget: 0, subcategoryBudgets: {} };
                            }
                        } else {
                            delete selectedCategories[category];
                        }
                        saveData();
                        renderBudgetTab();
                        updateHomeDropdowns();
                        updateOverviewCategorySelect();
                    });
                }
                
                const budgetInput = document.getElementById(`budget_${category.replace(/\s/g, '_')}`);
                if (budgetInput) {
                    budgetInput.addEventListener('change', (e) => {
                        if (selectedCategories[category]) {
                            selectedCategories[category].budget = parseFloat(e.target.value) || 0;
                            saveData();
                        }
                    });
                }
                
                // Add subcategory budget listeners
                const subcategories = allCategories[category];
                if (subcategories) {
                    subcategories.forEach(sub => {
                        const subInput = document.getElementById(`subbudget_${category.replace(/\s/g, '_')}_${sub.replace(/\s/g, '_')}`);
                        if (subInput) {
                            subInput.addEventListener('change', (e) => {
                                if (selectedCategories[category]) {
                                    if (!selectedCategories[category].subcategoryBudgets) {
                                        selectedCategories[category].subcategoryBudgets = {};
                                    }
                                    selectedCategories[category].subcategoryBudgets[sub] = parseFloat(e.target.value) || 0;
                                    saveData();
                                }
                            });
                        }
                    });
                }
            });
        }
        
        // Toggle subcategory budget section
        function toggleSubcategoryBudget(category) {
            const div = document.getElementById(`subcat_${category.replace(/\s/g, '_')}`);
            if (div.style.display === 'none') {
                div.style.display = 'block';
            } else {
                div.style.display = 'none';
            }
        }
        
        // Remove custom category
        function removeCustomCategory(category) {
            if (confirm(`Remove category "${category}"? All budgets and transactions for this category will be deleted.`)) {
                delete customCategories[category];
                delete selectedCategories[category];
                // Remove transactions with this category
                transactions = transactions.filter(t => t.category !== category);
                saveData();
                renderBudgetTab();
                updateHomeDropdowns();
                updateOverviewCategorySelect();
                updateUI();
            }
        }
        
        // Add custom category
        function addCustomCategory() {
            const newCategory = document.getElementById('newCategoryName').value.trim();
            if (!newCategory) {
                alert('Please enter a category name');
                return;
            }
            
            if (DEFAULT_CATEGORIES[newCategory] || customCategories[newCategory]) {
                alert('Category already exists');
                return;
            }
            
            customCategories[newCategory] = [];
            saveData();
            document.getElementById('newCategoryName').value = '';
            document.getElementById('customCategoryInput').style.display = 'none';
            renderBudgetTab();
            updateHomeDropdowns();
            updateOverviewCategorySelect();
        }
                // Update Overview tab category select
        function updateOverviewCategorySelect() {
            const categories = Object.keys(selectedCategories);
            const categorySelect = document.getElementById('categorySelect');
            const currentValue = categorySelect.value;
            
            categorySelect.innerHTML = '<option value="">Select a category</option>';
            categories.sort().forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
            
            if (currentValue && categories.includes(currentValue)) {
                categorySelect.value = currentValue;
            }
        }
        
        // Update Overview tab
        function updateOverviewTab() {
            const selectedMonth = document.getElementById('monthSelect').value || getCurrentMonth();
            const selectedCategory = document.getElementById('categorySelect').value;
            
            if (!selectedCategory || !selectedCategories[selectedCategory]) {
                document.getElementById('selectedCategoryName').textContent = '';
                document.getElementById('subcategoryListContainer').innerHTML = '<p>Select a category to view expenses</p>';
                if (chart) {
                    chart.destroy();
                    chart = null;
                }
                return;
            }
            
            // Get expenses for selected month and category
            const monthExpenses = getAllExpensesForMonth(selectedMonth);
            const categoryExpenses = monthExpenses.filter(t => t.category === selectedCategory);
            
            // Group by subcategory
            const groupedBySubcategory = {};
            categoryExpenses.forEach(t => {
                const sub = t.subcategory || 'Uncategorized';
                if (!groupedBySubcategory[sub]) {
                    groupedBySubcategory[sub] = [];
                }
                groupedBySubcategory[sub].push(t);
            });
            
            // Update subcategory list
            const container = document.getElementById('subcategoryListContainer');
            container.innerHTML = '';
            
            if (Object.keys(groupedBySubcategory).length === 0) {
                container.innerHTML = '<p>No expenses for this category in the selected month</p>';
            } else {
                for (const [sub, expenses] of Object.entries(groupedBySubcategory)) {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'subcategory-group';
                    
                    const title = document.createElement('div');
                    title.className = 'subcategory-title';
                    title.textContent = sub;
                    groupDiv.appendChild(title);
                    
                    let subtotal = 0;
                    expenses.forEach(exp => {
                        const row = document.createElement('div');
                        row.className = 'transaction-row';
                        row.innerHTML = `
                            <span>${formatDate(exp.date)}</span>
                            <span>$${exp.amount.toFixed(2)}</span>
                        `;
                        groupDiv.appendChild(row);
                        subtotal += exp.amount;
                    });
                    
                    const subtotalDiv = document.createElement('div');
                    subtotalDiv.className = 'subtotal';
                    subtotalDiv.innerHTML = `<strong>${sub} Total: $${subtotal.toFixed(2)}</strong>`;
                    groupDiv.appendChild(subtotalDiv);
                    
                    container.appendChild(groupDiv);
                }
            }
            
            document.getElementById('selectedCategoryName').textContent = selectedCategory;
            
            // Update chart
            const categoryBudget = selectedCategories[selectedCategory]?.budget || 0;
            const totalExpense = categoryExpenses.reduce((sum, t) => sum + t.amount, 0);
            
            if (chart) {
                chart.destroy();
            }
            
            const ctx = document.getElementById('budgetChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Budget', 'Actual Expense'],
                    datasets: [{
                        label: `Amount (${selectedCategory})`,
                        data: [categoryBudget, totalExpense],
                        backgroundColor: ['#3b82f6', '#ef4444'],
                        borderColor: ['#2563eb', '#dc2626'],
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Amount ($)',
                                font: { weight: 'bold' }
                            },
                            grid: { color: '#e5e7eb' }
                        },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '$' + context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Update home dropdowns (categories and subcategories)
        function updateHomeDropdowns() {
            const categories = Object.keys(selectedCategories);
            const categorySelect = document.getElementById('categorySelectHome');
            const currentCategory = categorySelect.value;
            
            categorySelect.innerHTML = '<option value="">Select a category</option>';
            categories.sort().forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
            
            if (currentCategory && categories.includes(currentCategory)) {
                categorySelect.value = currentCategory;
                updateSubcategoryDropdown(currentCategory);
            } else {
                document.getElementById('subcategorySelectHome').innerHTML = '<option value="">Select a sub-category (optional)</option>';
            }
        }
        // Update entire UI
        function updateUI() {
            updateHomeTab();
            updateHomeDropdowns();
            updateOverviewCategorySelect();
            const currentMonth = getCurrentMonth();
            if (!document.getElementById('monthSelect').value) {
                document.getElementById('monthSelect').value = currentMonth;
            }
            updateOverviewTab();
        }
        
        // Edit monthly budget (click on card)
        function editMonthlyBudget() {
            const newBudget = prompt('Enter monthly budget amount:', monthlyBudget);
            if (newBudget !== null && !isNaN(parseFloat(newBudget)) && parseFloat(newBudget) >= 0) {
                monthlyBudget = parseFloat(newBudget);
                saveData();
                updateUI();
            } else if (newBudget !== null) {
                alert('Please enter a valid amount');
            }
        }
        
        // Event Listeners
        document.getElementById('transactionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('categorySelectHome').value;
            const subcategory = document.getElementById('subcategorySelectHome').value;
            const description = document.getElementById('description').value;
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            if (!category) {
                alert('Please select a category');
                return;
            }
            
            addTransaction(amount, category, subcategory, description);
            
            // Reset form
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('amount').focus();
        });
        
        document.getElementById('budgetCard').addEventListener('click', editMonthlyBudget);
        
        document.getElementById('monthSelect').addEventListener('change', () => {
            updateOverviewTab();
        });
        
        document.getElementById('categorySelect').addEventListener('change', () => {
            updateOverviewTab();
        });
        
        document.getElementById('categorySelectHome').addEventListener('change', (e) => {
            updateSubcategoryDropdown(e.target.value);
        });
        
        // Add custom category buttons
        document.getElementById('addCustomCategoryBtn').addEventListener('click', () => {
            document.getElementById('customCategoryInput').style.display = 'flex';
        });
        
        document.getElementById('confirmAddCategory').addEventListener('click', addCustomCategory);
        
        document.getElementById('cancelAddCategory').addEventListener('click', () => {
            document.getElementById('customCategoryInput').style.display = 'none';
            document.getElementById('newCategoryName').value = '';
        });
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(tabName).classList.add('active');
                
                if (tabName === 'budget') {
                    renderBudgetTab();
                } else if (tabName === 'overview') {
                    updateOverviewTab();
                } else {
                    updateHomeTab();
                }
            });
        });
        
        // Make functions global for onclick handlers
        window.toggleSubcategoryBudget = toggleSubcategoryBudget;
        window.removeCustomCategory = removeCustomCategory;
        
        // Initialize
        displayCurrentDate();
        loadData();
        renderBudgetTab();
    </script>
</body>
</html>
